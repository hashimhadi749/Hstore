<!DOCTYPE html>
<html>
<head>
  <title>H Store</title>
  <link rel="stylesheet" href="style.css"> <!-- external CSS -->
</head>
<body>
  <h1>H Store</h1>

  <!-- Navigation -->
  <div>
    <ul>
      <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Services</a>
        <a href="#">About Us</a>
        <a href="#">Contact</a>
      </nav>
    </ul>
  </div>

  <!-- Search box -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search products...">
    <button onclick="searchItems()">Search</button>
  </div>

  <!-- Items list -->
  <div class="items">
    <div class="item">
      <img src="icons8-store-100.png" alt="Laptop">
      Laptop
    </div>
    <div class="item">
      <img src="printer_78322.png" alt="Phone">
      Phone
    </div>
    <div class="item">
      <img src="shopping-cart.png" alt="Headphones">
      Headphones
    </div>
        <div class="item">
      <img src="1 (5).JPG" alt="Headphones">
      Headphones
    </div>
        <div class="item">
      <img src="1 (12).JPG" alt="Headphones">
      Headphones
    </div>
    
    
    <!-- Add more items as needed -->
  </div>

  <!-- Modal -->
  <div id="myModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImg">
  </div>

  <!-- JavaScript -->
  <script>
    function searchItems() {
      let input = document.getElementById("searchInput").value.toLowerCase();
      let items = document.getElementsByClassName("item");

      for (let i = 0; i < items.length; i++) {
        let text = items[i].innerText.toLowerCase();
        items[i].style.display = text.includes(input) ? "block" : "none";
      }
    }

    document.getElementById("searchInput").addEventListener("keyup", searchItems);

    const modal = document.getElementById("myModal");
    const modalImg = document.getElementById("modalImg");
    const closeBtn = document.getElementsByClassName("close")[0];

    document.querySelectorAll(".item img").forEach(img => {
      img.addEventListener("click", () => {
        modal.style.display = "block";
        modalImg.src = img.src;
      });
    });

    closeBtn.onclick = () => modal.style.display = "none";
    window.onclick = e => { if (e.target == modal) modal.style.display = "none"; };
  </script>
</body>
</html>
